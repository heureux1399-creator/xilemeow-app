<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>洗咧喵 - 到府美容護照</title>

    <script src="https://unpkg.com/vue@3.3.4/dist/vue.global.prod.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <!-- 🚨 錯誤捕獲器（除錯用，穩定後可刪） -->
    <script>
      window.onerror = function(message, source, lineno) {
        var d = document.createElement('div');
        d.style.cssText = 'position:fixed;top:0;left:0;width:100%;background:red;color:white;z-index:99999;padding:16px;font-size:12px;word-wrap:break-word;';
        d.innerHTML = "🚨 同步錯誤：" + message + "<br>行數: " + lineno;
        document.body.appendChild(d);
        return true;
      };
      window.addEventListener('unhandledrejection', function(e) {
        var d = document.createElement('div');
        d.style.cssText = 'position:fixed;top:0;left:0;width:100%;background:orange;color:black;z-index:99999;padding:16px;font-size:12px;word-wrap:break-word;';
        d.innerHTML = "🟠 Promise 錯誤：" + (e.reason && e.reason.message ? e.reason.message : e.reason);
        document.body.appendChild(d);
      });
    </script>

    <style>
      [v-cloak] { display: none !important; }
      body { -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: #fdf4ff;}
    </style>
  </head>
  <body class="text-slate-700 pb-24">
    <div id="app" v-cloak class="min-h-screen flex flex-col max-w-md mx-auto bg-white shadow-2xl relative">

      <!-- 🔍 診斷列（穩定後可整段刪除） -->
      <div class="bg-slate-900 text-lime-300 text-[11px] font-mono px-3 py-2 leading-relaxed break-words">
        🔍 {{ debugStage }}
      </div>

      <div v-if="toast.show" :class="['fixed top-6 left-1/2 -translate-x-1/2 px-5 py-3 rounded-2xl shadow-xl z-[1000] flex items-center gap-2.5 font-bold text-sm w-[90%] max-w-xs', toast.isError ? 'bg-rose-600 text-white' : 'bg-slate-900 text-white']">
        <i :class="['fa-solid', toast.isError ? 'fa-triangle-exclamation text-rose-200' : 'fa-bell text-purple-300']"></i>
        <span class="break-words w-full">{{ toast.message }}</span>
      </div>

      <header class="bg-purple-600 text-white pt-8 pb-10 px-6 rounded-b-[32px] text-center shadow-lg">
        <h1 class="text-xl font-black tracking-widest flex items-center justify-center gap-2">洗咧喵 🐱 到府美容護照</h1>
        <p class="text-[11px] opacity-80 mt-1.5 font-medium tracking-wider">翻閱農民曆選吉日 ‧ 喵寶在家洗香香</p>
      </header>

      <main class="flex-1 p-4 space-y-4">

        <div class="bg-purple-50 p-4 rounded-xl border border-purple-200 text-center">
           <span class="text-xs text-purple-600 font-bold">目前綁定卡號：</span>
           <div class="text-lg font-black font-mono text-purple-900 mt-1">
             {{ myProfile.uid || '⏳ 系統連線驗證中...' }}
           </div>
        </div>

        <div class="space-y-4">
          <!-- 頁籤 1: 良辰吉日 -->
          <div v-if="currentTab === 'booking'" class="space-y-4">
            <section class="bg-white rounded-2xl p-5 border shadow-sm">
              <h2 class="text-sm font-black text-purple-900 mb-4">1. 選擇良辰吉日</h2>
              <div class="bg-slate-50 p-3 rounded-xl min-h-[200px] flex items-center justify-center">
                 <span v-if="calendarDates.length === 0" class="text-slate-400 text-sm font-bold animate-pulse">日曆數據讀取中...</span>
                 <div v-else class="w-full">
                   <div class="flex justify-between mb-4">
                     <button @click="moveWeeks(-28)" class="bg-purple-100 px-4 py-1 rounded font-bold text-purple-700">上月</button>
                     <button @click="moveWeeks(28)" class="bg-purple-100 px-4 py-1 rounded font-bold text-purple-700">下月</button>
                   </div>
                   <div class="grid grid-cols-7 gap-1">
                     <button v-for="d in calendarDates" :key="d.dateStr" :disabled="!d.isClickable"
                          :class="['p-1 rounded text-center border', selectedDate === d.dateStr ? 'bg-purple-600 text-white' : (!d.isClickable ? 'bg-slate-100 text-slate-300' : 'bg-white border-slate-300')]" @click="selectDate(d)">
                       <div class="text-[10px] font-bold">{{ d.dateLabel }}</div>
                       <div class="text-[8px] mt-1">{{ d.isPast ? '已過' : (d.isOpen ? '有空' : '滿') }}</div>
                     </button>
                   </div>
                 </div>
              </div>
            </section>
          </div>

          <!-- 頁籤 2: 喵星護照 -->
          <div v-if="currentTab === 'cats'" class="space-y-4">
            <section class="bg-white rounded-2xl p-5 border shadow-sm">
               <h2 class="text-sm font-black text-purple-900 mb-4">建立護照</h2>
               <input type="text" v-model="newCat.name" placeholder="貓咪名字" class="w-full border p-3 rounded mb-2 bg-slate-50">
               <button @click="registerCat" class="w-full bg-emerald-500 text-white font-bold p-3 rounded">新增貓咪</button>
            </section>
          </div>

          <!-- 頁籤 3: 家長中心 -->
          <div v-if="currentTab === 'member'" class="space-y-4">
            <section class="bg-white rounded-2xl p-5 border shadow-sm">
               <h2 class="text-sm font-black text-purple-900 mb-4">家長資料</h2>
               <input type="text" v-model="myProfile.name" placeholder="姓名" class="w-full border p-3 rounded mb-2 bg-slate-50">
               <input type="text" v-model="myProfile.phone" placeholder="電話" class="w-full border p-3 rounded mb-2 bg-slate-50">
               <input type="text" v-model="myProfile.address" placeholder="地址" class="w-full border p-3 rounded mb-2 bg-slate-50">
               <button @click="saveProfile" class="w-full bg-purple-600 text-white font-bold p-3 rounded">儲存資料</button>
            </section>
          </div>
        </div>
      </main>

      <nav class="fixed bottom-0 left-0 w-full bg-white border-t flex justify-around p-3 z-50">
        <button @click="switchTab('booking')" :class="['font-bold text-sm', currentTab==='booking' ? 'text-purple-600' : 'text-slate-400']">良辰吉日</button>
        <button @click="switchTab('cats')" :class="['font-bold text-sm', currentTab==='cats' ? 'text-purple-600' : 'text-slate-400']">喵星護照</button>
        <button @click="switchTab('member')" :class="['font-bold text-sm', currentTab==='member' ? 'text-purple-600' : 'text-slate-400']">家長中心</button>
      </nav>

    </div>

    <script>
      // ==========================================================
      // ⚙️ 唯一需要你維護的設定：GAS 的 /exec 網址
      //    （若之後重新部署導致網址變了，只要改這一行）
      // ==========================================================
      const GAS_API = "https://script.google.com/macros/s/AKfycby3eWQRPWnYfqWctOdGjtDomq4qAxzNfrSceWo0lo_m2gHnyiyi2KVGYx1-EB9GRtoW/exec";
      const LIFF_ID = "2010742657-DOz9QdF3";

      const { createApp, ref, onMounted } = Vue;
      createApp({
        setup() {
          const currentTab = ref('booking');
          const myProfile = ref({ uid: '', name: '', balance: 0, address: '', phone: '', note: '' });
          const myCats = ref([]);
          const calendarDates = ref([]);
          const selectedDate = ref('');
          const newCat = ref({ name: '', breed: '', weight: '', gender: '小男生 👦', note: '' });
          const weekOffset = ref(0);
          const toast = ref({ show: false, message: '', isError: false });
          const debugStage = ref('尚未開始');
          let scheduleCacheMap = {};
          let lineUserId = '';

          const showToast = (msg, isError = false) => {
            toast.value.message = msg; toast.value.isError = isError; toast.value.show = true;
            setTimeout(() => { toast.value.show = false; }, 3000);
          };
          const switchTab = (tab) => { currentTab.value = tab; };

          // ---- 讀取類：用 GET（帶 action 參數）----
          const apiGet = async (params) => {
            const url = GAS_API + "?" + new URLSearchParams(params).toString();
            const resp = await fetch(url);              // GAS 的 GET 無 CORS 問題
            return await resp.json();
          };

          // ---- 寫入類：用 POST（text/plain 避開 CORS 預檢）----
          const apiPost = async (payload) => {
            const resp = await fetch(GAS_API, {
              method: "POST",
              headers: { "Content-Type": "text/plain;charset=utf-8" },
              body: JSON.stringify(payload)
            });
            return await resp.json();
          };

          const fetchUserData = async () => {
            debugStage.value = '④ 呼叫後端 getProfile（自動判斷新舊客/發卡）...';
            try {
              const res = await apiGet({ action: "getProfile", uid: lineUserId });
              if (res && res.success) {
                myProfile.value.uid = res.info.uid;
                myProfile.value.name = res.info.name;
                myProfile.value.phone = res.info.phone;
                myProfile.value.address = res.info.address;
                debugStage.value = '⑤ 完成！卡號 = ' + res.info.uid;
                preloadSchedule();
              } else {
                debugStage.value = '④ 後端回失敗：' + (res ? res.error : 'null');
                showToast("讀取失敗：" + (res ? res.error : 'null'), true);
              }
            } catch (e) {
              debugStage.value = '④ fetch 失敗：' + e.message + '（多半是 GAS 網址錯或權限沒開 Anyone）';
              showToast("連線失敗：" + e.message, true);
            }
          };

          const preloadSchedule = async () => {
            debugStage.value = '⑤ 載入日曆...';
            try {
              const today = new Date();
              const res = await apiGet({ action: "getCalendar", year: today.getFullYear(), month: today.getMonth() + 1 });
              if (res && res.scheduleMap) scheduleCacheMap = res.scheduleMap;
              renderMatrixFromCache();
              debugStage.value = '✅ 全部完成';
            } catch (e) {
              debugStage.value = '⑤ 日曆載入失敗：' + e.message;
              renderMatrixFromCache();
            }
          };

          const renderMatrixFromCache = () => {
            const today = new Date(); today.setHours(0,0,0,0);
            const currentDay = today.getDay(), distanceToMonday = currentDay === 0 ? -6 : 1 - currentDay;
            const startMonday = new Date(today); startMonday.setDate(today.getDate() + distanceToMonday + weekOffset.value);
            const datesArray = [];
            for (let i = 0; i < 28; i++) {
              let t = new Date(startMonday); t.setDate(startMonday.getDate() + i);
              let y = t.getFullYear(), m = t.getMonth() + 1, d = t.getDate();
              let dStr = `${y}-${m < 10 ? '0' + m : m}-${d < 10 ? '0' + d : d}`;
              let isPast = (t.getTime() <= today.getTime()), isOpen = false, isClickable = false;
              // 至少一個時段 === '開放' 才算有空
              if (!isPast && scheduleCacheMap[dStr]) {
                let dayMap = scheduleCacheMap[dStr];
                let hasOpen = Object.keys(dayMap).some(function(slot) {
                  return String(dayMap[slot]).trim() === '開放';
                });
                if (hasOpen) { isOpen = true; isClickable = true; }
              }
              datesArray.push({ dateStr: dStr, dateLabel: `${m}/${d}`, isPast, isOpen, isClickable });
            }
            calendarDates.value = datesArray;
          };

          const selectDate = (day) => { if (day.isClickable) selectedDate.value = day.dateStr; };
          const moveWeeks = (days) => { weekOffset.value += days; renderMatrixFromCache(); };

          const saveProfile = async () => {
            try {
              const res = await apiPost({
                action: "updateProfile", uid: myProfile.value.uid,
                name: myProfile.value.name, address: myProfile.value.address,
                phone: myProfile.value.phone, clientNote: ""
              });
              showToast(res && res.success ? '更新成功！' : '更新失敗', !(res && res.success));
            } catch (e) { showToast("更新失敗：" + e.message, true); }
          };

          const registerCat = async () => {
            try {
              const res = await apiPost({ action: "registerCat", uid: myProfile.value.uid, cat: newCat.value });
              showToast(res && res.success ? '註冊成功！' : '註冊失敗', !(res && res.success));
            } catch (e) { showToast("註冊失敗：" + e.message, true); }
          };

          onMounted(() => {
            debugStage.value = '① 開始 liff.init...';
            liff.init({ liffId: LIFF_ID }).then(() => {
              debugStage.value = '② liff.init 成功，檢查登入...';
              if (liff.isLoggedIn()) {
                debugStage.value = '③ 已登入，取得 profile...';
                liff.getProfile().then(profile => {
                  lineUserId = profile.userId;
                  debugStage.value = '③ profile OK，userId=' + profile.userId.substring(0, 8) + '...';
                  fetchUserData();
                }).catch(err => { debugStage.value = '③ getProfile 失敗：' + err; showToast("Profile Error", true); });
              } else {
                if (liff.isInClient()) { debugStage.value = '② 未登入，觸發 login...'; liff.login(); }
                else { debugStage.value = '② 非 LINE 環境'; showToast("請在 LINE 開啟"); }
              }
            }).catch(err => { debugStage.value = '① liff.init 失敗：' + err; showToast("Init Error: " + err, true); });
          });

          return { currentTab, myProfile, myCats, calendarDates, selectedDate, newCat, toast, debugStage, switchTab, moveWeeks, selectDate, saveProfile, registerCat };
        }
      }).mount('#app');
    </script>
  </body>
</html>
